<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Name Trainer</title>
<style>
  body { text-align: center; }
  img { width: 200px; }
  .ok { color: green; }
  .no { color: red; }
  .hidden { display: none; }
</style>
</head>
<body>

<div id="study">
  <p><img id="study-img" alt=""></p>
  <h2 id="study-name"></h2>
  <p id="study-count"></p>
  <p><button id="next">Next</button> <button id="skip">Skip to quiz</button></p>
</div>

<div id="quiz" class="hidden">
  <p><img id="quiz-img" alt=""></p>
  <p><input id="answer" placeholder="Who is this?" autocomplete="off" spellcheck="false">
     <button id="quiz-next" class="hidden">Next</button></p>
  <p id="feedback"></p>
  <p id="left"></p>
</div>

<div id="pass" class="hidden">
  <h2 id="pass-score"></h2>
  <p><button id="pass-next">Again</button> or press Enter</p>
</div>

<div id="done" class="hidden">
  <h2 id="done-score"></h2>
  <p><button id="again">Again</button> or press Enter</p>
</div>

<script src="people.js"></script>
<script>
const people = window.PEOPLE || [];
if (window.TRAINER_TITLE) document.title = window.TRAINER_TITLE;
if (!people.length) document.body.innerHTML = '<p>No people — edit <code>people.js</code>.</p>';

const $ = id => document.getElementById(id);
const shuffle = a => {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

// lowercase, strip accents and punctuation
const fold = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '')
  .toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
// accept the full name or any single part of it (first, last, ...)
const matches = (typed, name) => {
  const t = fold(typed), f = fold(name);
  return t && (t === f || f.split(' ').includes(t));
};

// ── Study: flip through every face + name ──
let i = 0;
const order = shuffle([...people]);
function study() {
  $('study-img').src = order[i].img;
  $('study-name').textContent = order[i].name;
  $('study-count').textContent = (i + 1) + ' / ' + order.length;
}
$('next').onclick = () => { if (++i < order.length) study(); else startQuiz(); };
$('skip').onclick = startQuiz;
if (people.length) study();

// ── Quiz: type each name; a pass ends when the queue is empty ──
let queue, missed, current, showing;
function startQuiz() {
  $('study').classList.add('hidden');
  $('pass').classList.add('hidden');
  $('done').classList.add('hidden');
  $('quiz').classList.remove('hidden');
  queue = shuffle([...people]);
  missed = new Set();
  ask();
}
function endPass() {
  $('quiz').classList.add('hidden');
  const right = people.length - missed.size;
  if (!missed.size) {
    $('done-score').textContent = 'Perfect — all ' + people.length + ' right!';
    $('done').classList.remove('hidden');
  } else {
    $('pass-score').textContent = 'You got ' + right + ' / ' + people.length;
    $('pass').classList.remove('hidden');
  }
}
function ask() {
  if (!queue.length) return endPass();
  current = queue.shift();
  showing = false;
  $('quiz-img').src = current.img;
  $('answer').value = '';
  $('feedback').textContent = '';
  $('quiz-next').classList.add('hidden');
  $('left').textContent = (queue.length + 1) + ' left this pass';
  $('answer').focus();
}
function check() {
  const typed = $('answer').value.trim();
  if (!typed) return;
  showing = true;
  if (matches(typed, current.name)) {
    $('feedback').textContent = '✅ ' + current.name;
    $('feedback').className = 'ok';
  } else {
    missed.add(current.name);
    queue.splice(Math.min(2, queue.length), 0, current); // ask again soon
    $('feedback').innerHTML = '❌ ';
    const b = document.createElement('b');
    b.textContent = current.name;
    $('feedback').appendChild(b);
    $('feedback').className = 'no';
  }
  $('quiz-next').classList.remove('hidden');
}
$('answer').addEventListener('keydown', e => {
  if (e.key === 'Enter') showing ? ask() : check();
});
$('quiz-next').onclick = ask;
$('pass-next').onclick = startQuiz;
$('again').onclick = startQuiz;
// Enter starts a new round from the score screens
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter' || e.target === $('answer')) return;
  if (!$('pass').classList.contains('hidden') || !$('done').classList.contains('hidden')) startQuiz();
});
</script>
</body>
</html>
